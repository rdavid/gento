---
name: shellcheck
'on':
  push:
    branches: [master]
    paths: &paths ['**.do', '**.sh', .github/workflows/shellcheck.yml, app/**]
  pull_request:
    paths: *paths
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: ./*.do ./app/* ./cfg/*.sh
