---
name: release
'on':
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
      - '[0-9]+.[0-9]+.[0-9]+\+*'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
