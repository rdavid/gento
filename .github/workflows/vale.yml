---
name: vale
'on':
  push:
    branches: [master]
    paths: &paths
      - '**.adoc'
      - .github/styles/**
      - .github/workflows/vale.yml
      - .vale.ini
  pull_request:
    paths: *paths
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  checks: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}
jobs:
  vale:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@v6.1.0
        with:
          path: .github/styles
          key: vale-styles-${{ hashFiles('.vale.ini') }}
          restore-keys: vale-styles-
      - run: |
          sudo apt-get update
          sudo apt-get install \
            --assume-yes \
            --no-install-recommends \
            asciidoctor
      - uses: vale-cli/vale-action@2.1.2
        with:
          fail_on_error: true
