---
name: shellcheck
'on':
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: ./*.do ./app/* ./cfg/*.sh
