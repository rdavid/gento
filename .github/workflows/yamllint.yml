---
name: yamllint
'on':
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  yamllint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: >
            ./.github/*.yml
            ./.github/workflows/*.yml
            ./cfg/*.yml
          strict: true
