---
name: shfmt
'on':
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
jobs:
  shfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: mfinelli/setup-shfmt@v4.0.1
      - run: shfmt -d ./*.do ./app/* ./cfg/*.sh
